[gitlab]
# The path to the private key assumes you run ansible from the gitlab-ansible folder
# and your Vagrantfile is in the gitlab-vm folder next to it.
127.0.0.1 ansible_port=2222 ansible_user=vagrant ansible_ssh_private_key_file=../gitlab-vm/.vagrant/machines/default/virtualbox/private_key
# Note: If you are using a provider other than virtualbox (like qemu or parallels for Apple Silicon), replace 'virtualbox' with your provider's name in the key path.